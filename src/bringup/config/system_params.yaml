external_cam_node:
  ros__parameters:
    rgb_topic: /external_camera/color/image_raw
    depth_topic: /external_camera/depth/image_rect_raw
    camera_info_topic: /external_camera/color/camera_info
    objects_topic: /external_objects
    initialize_scene_service: /initialize_scene_objects
    detect_object_pose_service: /detect_object_pose
    frame_id: external_camera_color_optical_frame

turtlebot_delivery_node:
  ros__parameters:
    loading_frame: map
    unloading_frame: map

task_manager_node:
  ros__parameters:
    number_of_texture_categories: 3


external_depth_camera:
  ros__parameters:
    serial_no: "'925622071555'"
    camera_name: external_camera
    camera_namespace: ''
    enable_color: 'true'
    enable_depth: 'true'
    pointcloud.enable: 'false'

kinova_vision:
  ros__parameters:
    device: 192.168.1.10
    camera: wrist_camera
    color_frame_id: camera_color_frame
    launch_color: 'true'
    launch_depth: 'false'
    publish_tf: 'false'
    color_rtsp_element_config: color latency=200

manipulation_node:
  ros__parameters:
    groundings_topic: /groundings
    base_frame: base_link
    ee_link: end_effector_link
    move_group: manipulator
    vel_scale: 0.3
    accel_scale: 0.3
    grasp_z_offset: 0.00
    approach_height: 0.12
    gripper_closed_position: 0.79
    grasp_point_offset_x: 0.0
    grasp_point_offset_y: 0.0
    grasp_point_offset_z: 0.12
    pre_grasp_path: ''

apriltag:
  ros__parameters:
    size: 0.05

# camera_color_frame is published by robot_state_publisher via kortex_control (vision:=true)

wrist_camera_tf:
  ros__parameters:
    parent_frame: end_effector_link
    child_frame: camera_color_frame
    x: 0.0
    y: 0.05639
    z: -0.00305
    roll: 3.141592653589793
    pitch: 0.0
    yaw: 0.0

grasp_point_tf:
  ros__parameters:
    parent_frame: end_effector_link
    child_frame: grasp_point
    x: 0.0
    y: 0.0
    z: 0.12
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

apriltag_overlay:
  ros__parameters:
    image_topic: /wrist_camera/color/image_raw
    camera_info_topic: /wrist_camera/color/camera_info
    detections_topic: apriltag/detections
    overlay_topic: /detections_image
    grounding_topic: /groundings
    tag_size: 0.04064
    ee_frame: end_effector_link
