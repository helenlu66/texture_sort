external_cam_node:
  ros__parameters:
    rgb_topic: /external_camera/color/image_raw
    depth_topic: /external_camera/depth/image_rect_raw
    camera_info_topic: /external_camera/color/camera_info
    objects_topic: /external_objects
    initialize_scene_service: /initialize_scene_objects
    detect_object_pose_service: /detect_object_pose
    frame_id: external_camera_color_optical_frame

turtlebot_delivery_node:
  ros__parameters:
    loading_frame: map
    unloading_frame: map

task_manager_node:
  ros__parameters:
    number_of_texture_categories: 3


external_depth_camera:
  ros__parameters:
    serial_no: "'925622071555'"
    camera_name: external_camera
    camera_namespace: ''
    enable_color: 'true'
    enable_depth: 'true'
    pointcloud.enable: 'false'

kinova_vision:
  ros__parameters:
    device: 192.168.1.10
    camera: wrist_camera
    color_frame_id: wrist_camera_color_optical_frame
    launch_color: 'true'
    launch_depth: 'false'

manipulation_node:
  ros__parameters:
    groundings_topic: /groundings

apriltag:
  ros__parameters:
    size: 0.05

# Static transform from tool_frame to wrist_camera_color_optical_frame.
# x: in front of EE (along approach axis), z: above EE (along arm axis).
# Rotation defaults to 0 — refine with easy_handeye2 calibration.
wrist_camera_tf:
  ros__parameters:
    parent_frame: tool_frame
    child_frame: wrist_camera_color_optical_frame
    x: 0.0635
    y: 0.0
    z: 0.1397
    roll: 0.0
    pitch: 0.0
    yaw: 0.0

apriltag_overlay:
  ros__parameters:
    image_topic: /wrist_camera/color/image_raw
    camera_info_topic: /wrist_camera/color/camera_info
    detections_topic: apriltag/detections
    overlay_topic: /detections_image
    grounding_topic: /groundings
    tag_size: 0.05
    ee_frame: tool_frame


